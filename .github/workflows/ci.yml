name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.3"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go build ./...

  # vet is intentionally omitted while absorbed test scaffolding (from the
  # luxfi/proto merge) is reconciled with the current luxfi/sdk / validators
  # surfaces. Re-enable once p/block/*, p/txs/tx_fuzz_test.go, and
  # x/txs/executor test stubs are updated. build is sufficient to detect
  # production-code regressions in the meantime.
